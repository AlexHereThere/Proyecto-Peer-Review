<script>
/**
 * js_revisiones.html - Lógica optimizada para la gestión de revisiones en el cliente.
 */

/** @type {Array<Object>} Lista completa de revisiones obtenidas del servidor */
let todasLasRevisiones = [];

/** @type {string} Criterio de búsqueda actual ("Nombre" o "Estado") */
let buscarPorRev = "Nombre";

/** * @constant {Object} Mapeo de estados de revisión a clases de Bootstrap 
 */
const BADGE_ESTADO_REV = {
  "Nuevo": "bg-secondary",
  "En revisión": "bg-warning text-dark",
  "Finalizado": "bg-success"
};

// --- CARGA DE DATOS ---

/**
 * Inicializa la vista de revisiones y prepara la carga de la tabla.
 * @function cargarRevisiones
 */
function cargarRevisiones() {
  const criterioEl = document.getElementById("criterioActualRev");
  if (criterioEl) criterioEl.textContent = "Nombre";
  cargarTablaRevisiones();
}

/**
 * Solicita al servidor las revisiones del usuario y gestiona el renderizado.
 * @function cargarTablaRevisiones
 */
function cargarTablaRevisiones() {
  const tbody = document.getElementById("tablaRevisiones");
  if (!tbody) return;
  mostrarLoadingRevisiones(tbody, true);
  google.script.run
    .withSuccessHandler((data) => {
      mostrarLoadingRevisiones(tbody, false);
      todasLasRevisiones = data || [];
      renderTablaRevisiones(todasLasRevisiones);
    })
    .withFailureHandler((err) => {
      mostrarLoadingRevisiones(tbody, false);
      tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-3">Error: ${err.message}</td></tr>`;
    })
    .obtenerRevisiones_Usuario();
}

// --- FILTRADO Y RENDERIZADO ---

/**
 * Actualiza el criterio de búsqueda en la interfaz.
 * @function setBuscarPorRev
 * @param {string} valor - El nuevo criterio ("Nombre" o "Estado").
 */
function setBuscarPorRev(valor) {
  buscarPorRev = valor;
  const criterioEl = document.getElementById("criterioActualRev");
  if (criterioEl) criterioEl.textContent = valor;
  filtrarRevisiones();
}

/**
 * Filtra las revisiones locales basándose en el input del buscador y el criterio activo.
 * @function filtrarRevisiones
 */
function filtrarRevisiones() {
  const query = document.getElementById("buscadorRev")?.value.toLowerCase() || "";
  const filtrados = todasLasRevisiones.filter(rev => {
    if (buscarPorRev === "Nombre") {
      const stringBusqueda = `Revisión #${rev.numRev} ${rev.nombreDoc}`.toLowerCase();
      return stringBusqueda.includes(query);
    } else {
      return rev.estado.toLowerCase().includes(query);
    }
  });
  renderTablaRevisiones(filtrados);
}

/**
 * Genera el HTML de las filas de la tabla de revisiones.
 * @function renderTablaRevisiones
 * @param {Array<Object>} data - Lista de revisiones filtradas/procesadas.
 */
function renderTablaRevisiones(data) {
  const tbody = document.getElementById("tablaRevisiones");
  if (!tbody) return;
  if (!data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted py-3">No tienes revisiones asignadas.</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(rev => {
    const { idArchivoRev, numRev, nombreDoc, estado, fecha } = rev;
    const badgeClass = BADGE_ESTADO_REV[estado] || "bg-secondary";
    const nombreDisplay = `Revisión #${numRev} de ${nombreDoc || 'Documento'}`;
    return `
      <tr>
        <td class="align-middle">
          <a class="fw-semibold link-primary text-decoration-none" href="#" 
             onclick="verDetalleRevision('${idArchivoRev}', '${nombreDisplay}'); return false;">
            <i class="bi bi-file-earmark-medical me-2"></i>${nombreDisplay}
          </a>
        </td>
        <td class="align-middle text-center">
          <span class="badge ${badgeClass} rounded-pill px-3">${estado}</span>
        </td>
        <td class="text-muted small">${fecha}</td>
      </tr>`;
  }).join("");
}

// --- HELPERS Y NAVEGACIÓN ---

/**
 * Almacena el ID de revisión seleccionado y navega a la vista del visor del revisor.
 * @function verDetalleRevision
 * @param {string} idArchivoR - ID del archivo de revisión en Drive.
 * @param {string} nombreRev - Nombre descriptivo para mostrar en el visor.
 */
function verDetalleRevision(idArchivoR, nombreRev) {
  window.ID_REVISION_ACTUAL = idArchivoR;
  window.NOMBRE_REVISION_ACTUAL = nombreRev;
  cargarVista("page_revisor_visor");
}

/**
 * Muestra u oculta un indicador de carga en el cuerpo de la tabla.
 * @function mostrarLoadingRevisiones
 * @param {HTMLElement} tbody - El cuerpo de la tabla.
 * @param {boolean} show - Define si se muestra (true) o se oculta (false).
 */
function mostrarLoadingRevisiones(tbody, show) {
  if (show) {
    tbody.innerHTML = `
      <tr>
        <td colspan="3" class="text-center text-muted py-4">
          <div class="spinner-border spinner-border-sm text-primary me-2"></div>
          Cargando asignaciones...
        </td>
      </tr>`;
  }
}
</script>
