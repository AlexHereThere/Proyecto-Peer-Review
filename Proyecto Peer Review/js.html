<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/**
 * js.html - Lógica de Navegación y Sesión (Cliente)
 * Gestiona el ciclo de vida de la Single Page Application (SPA).
 */

/**
 * Evento de inicialización al cargar la ventana.
 * Coordina la carga del perfil visual y la sincronización con la base de datos.
 */
window.addEventListener("load", () => {
  // 1. Cargar datos visuales del usuario (foto/nombre) inmediatamente
  cargarUsuario();

  // 2. Sincronizar usuario con la base de datos y cargar la página de inicio
  google.script.run
    .withSuccessHandler(res => {
      console.log(res.esNuevo ? "Usuario nuevo registrado" : "Usuario existente");
      cargarVista("page_home");
    })
    .withFailureHandler(err => console.error("Error al inicializar usuario:", err))
    .inicializarUsuario();
});

/**
 * Solicita al servidor la información de perfil de Google y la renderiza en el Header.
 */
function cargarUsuario() {
  google.script.run
    .withSuccessHandler(user => {
      const nameEl = document.getElementById("userName");
      const photoEl = document.getElementById("userPhoto");
      
      if (nameEl) nameEl.innerText = user.name;
      if (photoEl) photoEl.src = user.photo;
    })
    .sacarGoogleInfoUsuario();
}

/**
 * Carga dinámicamente un archivo HTML en el contenedor principal (#contenido).
 * Implementa el patrón de Single Page Application (SPA).
 * @param {string} nombre - Nombre del archivo .html en el servidor (ej: "page_home").
 */
function cargarVista(nombre) {
  google.script.run
    .withSuccessHandler(html => {
      const contenedor = document.getElementById("contenido");
      if (contenedor) {
        contenedor.innerHTML = html;
        inicializarVista(nombre);
      }
    })
    .withFailureHandler(err => console.error(`Error al cargar vista [${nombre}]:`, err))
    .getVista(nombre);
}

/**
 * Actúa como un Router interno. Ejecuta las funciones de inicialización 
 * específicas para cada página una vez que el HTML ha sido inyectado en el DOM.
 * @param {string} nombre - Identificador de la vista cargada.
 */
function inicializarVista(nombre) {
  console.log("Navegando a:", nombre);

  const routers = {
    "page_home": () => typeof cargarHome === "function" && cargarHome(),
    "page_revisiones":() => typeof cargarRevisiones === "function" && cargarRevisiones(),
    "page_revisor_visor": () => typeof cargarRevVisor === "function" && cargarRevVisor(),
    "page_documentos": () => typeof cargarDocumentos === "function" && cargarDocumentos(),
    "page_doc_detalle": () => typeof cargarDetalle === "function" && cargarDetalle(),
    "page_autor_visor": () => typeof cargarAutVisor === "function" && cargarAutVisor(),
    "page_cuenta": () => typeof cargarDashboard === "function" && cargarDashboard()
    
  };

  if (routers[nombre]) {
    routers[nombre]();
  }
}

// --- 3. Utilidades de Sistema (Promesas y Conversión) ---

/**
 * Crea una promesa que se resuelve cuando un elemento específico aparece en el DOM.
 * Útil para manejar la carga asíncrona de componentes dinámicos.
 * @param {string} id - El ID del elemento a esperar.
 * @return {Promise<HTMLElement>} Nodo del DOM encontrado.
 */
function esperarElemento(id) {
  return new Promise(resolve => {
    const check = () => {
      const el = document.getElementById(id);
      el ? resolve(el) : requestAnimationFrame(check);
    };
    check();
  });
}

/**
 * Convierte un arreglo de bytes (Uint8Array) a una cadena Base64 asíncronamente.
 * @param {Uint8Array} uint8Array - Datos binarios del archivo.
 * @return {Promise<string>} Cadena codificada en Base64.
 */
window.uint8ToBase64 = (uint8Array) => {
  return new Promise((resolve, reject) => {
    const blob = new Blob([uint8Array], { type: 'application/octet-stream' });
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
};

/**
 * Convierte un objeto File (de un input tipo file) a un Uint8Array.
 * @param {File} file - Objeto de archivo del navegador.
 * @return {Promise<Uint8Array>} Datos binarios listos para procesar.
 */
window.fileToUint8 = (file) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(new Uint8Array(reader.result));
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
};

/**
 * Fallback interno para transformar una cadena Base64 en un ArrayBuffer binario.
 * @param {string} base64 - Cadena codificada en Base64.
 * @return {ArrayBuffer} Búfer de memoria con los datos binarios.
 * @private
 */
function _internalBase64ToBinary(base64) {
  const binaryString = window.atob(base64);
  const len = binaryString.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }
  return bytes.buffer;
}

/**
 * Wrapper que envuelve las llamadas a `google.script.run` en una Promesa nativa.
 * Permite utilizar la sintaxis moderna `async/await` en el cliente.
 * Ademas realiza la medicion de tiempo de respuesta de API
 * @param {string} funcName - Nombre de la función definida en el servidor (.gs).
 * @param {Array} [args=[]] - Argumentos para pasar a la función del servidor.
 * @return {Promise<any>} Promesa con la respuesta del servidor.
 */
function runServer(funcName, args = []) {
  return new Promise((resolve, reject) => {
    const inicio = performance.now();

    google.script.run
      .withSuccessHandler((result) => {
        const fin = performance.now();
        const tiempo = (fin - inicio).toFixed(2);
        console.log(`Tiempo API ${funcName}: ${tiempo} ms`);
        resolve(result);
      })
      .withFailureHandler((error) => {
        const fin = performance.now();
        const tiempo = (fin - inicio).toFixed(2);
        console.error(`Error en API ${funcName} (${tiempo} ms):`, error);
        reject(error);
      })
      [funcName](...args);
  });
}
</script>
