<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<style>

/* Tema personalizado */
:root {
  /* PRIMARY (Verde Autor) */
  --bs-primary: #00723f;
  --bs-primary-rgb: 0, 114, 63;
  /* SECONDARY (Oro Revisor) */
  --bs-secondary: #dd971a;
  --bs-secondary-rgb: 221, 151, 26;
  /* SUCCESS (Azul Admin) */
  --bs-success: #20419A;
  --bs-success-rgb: 32, 65, 154;
  /* INFO (Púrpura) */
  --bs-info: #630df0;
  --bs-info-rgb: 99, 13, 240;
}

/* Color en botones */
.btn-primary {
  background-color: var(--bs-primary);
  border-color: var(--bs-primary);
}
.btn-secondary {
  background-color: var(--bs-secondary);
  border-color: var(--bs-secondary);
}
.bg-primary {
  background-color: var(--bs-primary) !important;
}
.bg-secondary {
  background-color: var(--bs-secondary) !important;
}
.text-primary {
  color: var(--bs-primary) !important;
}
.text-success {
  color: var(--bs-success) !important;
}
.text-warning-emphasis {
  color: var(--bs-secondary) !important; /* Mapeado a tu color oro */
}

footer .bs-icon svg {
    color: var(--bs-primary);
}

.profile {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  margin: auto;
  display: block;
}

.bs-icon {
  display: flex;
  align-items: center;
  justify-content: center;
}

.bs-icon-circle {
  border-radius: 50%;
}

.bs-icon-xl {
  width: 90px;
  height: 90px;
  font-size: 1.5rem;
}

/* Fuerza a que todos los círculos sutiles tengan un fondo gris muy claro y limpio */
.rounded-circle.bg-primary-subtle,
.rounded-circle.bg-secondary-subtle,
.rounded-circle.bg-success-subtle,
.rounded-circle.bg-danger-subtle,
.rounded-circle.bg-warning-subtle,
.rounded-circle.bg-info-subtle,
.rounded-circle.bg-dark-subtle {
  background-color: #f1f3f5 !important; /* Gris neutro claro */
  border: 1px solid #e9ecef;          /* Delicado borde perimetral */
}

/* Fuerza a que los íconos de Bootstrap dentro de estos círculos sean negros/antracita */
.rounded-circle[class*="-subtle"] i.bi {
  color: #212529 !important; /* Negro Bootstrap (Soft Black) */
}

[data-bs-theme="dark"] .fw-bold.text-dark {
  color: #f8f9fa !important; /* Cambia los números a blanco/gris claro */
}

</style>
