<script>
/**
 * js_doc_detalle.html - Gestión de Versiones y Revisiones (Vista del Autor)
 */

// --- 1. VARIABLES GLOBALES ---

let versiones = [];
let versionActual = null;
let idDocumentoRaiz = null;
let versionesFolderId = null;
let revisionesFolderId = null;

// --- 2. INICIALIZACIÓN ---

function cargarDetalle() {
  const idDocOriginal = window.ID_DOCUMENTO_ACTUAL;
  if (!idDocOriginal) return cargarVista("page_documentos");
  
  idDocumentoRaiz = idDocOriginal;
  esperarElemento("previewPDF").then(() => cargarDetalleDocumento());
}

function cargarDetalleDocumento() {
  google.script.run
    .withSuccessHandler(renderDetalle)
    .withFailureHandler(err => {
      alert("Error: " + err.message);
    })
    .obtenerDetalleDocumento(idDocumentoRaiz);
}

// --- 3. RENDERIZADO DE INTERFAZ (UI) ---

function renderDetalle(data) {
  if (!data) return cargarVista("page_documentos");

  const titulo = document.getElementById("tituloProyecto");
  if (titulo) titulo.innerText = data.nombre || "Sin título";
  
  versiones = data.versiones || [];
  if (data.carpetas) {
    versionesFolderId = data.carpetas.versiones || null;
    revisionesFolderId = data.carpetas.revisiones || null;
  }
  renderTabsVersiones();
}

function renderTabsVersiones() {
  const cont = document.getElementById("tabsVersiones");
  if (!cont) return;
  if (versiones.length === 0) {
    cont.innerHTML = '<li class="nav-item"><span class="nav-link disabled">Sin versiones</span></li>';
    return;
  }
  cont.innerHTML = versiones.map((ver, i) => `
    <li class="nav-item">
      <a class="nav-link ${i === 0 ? 'active' : ''}" href="#" onclick="seleccionarVersion(${i}); return false;">
        V${ver.numero}
      </a>
    </li>
  `).join("");
  seleccionarVersion(0);
}

function renderRevisionesVersion(revs) {
  const tbody = document.getElementById("tablaRevisiones");
  if (!tbody) return;
  
  if (!revs || revs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted small">Aún no se han asignado dictaminadores.</td></tr>`;
    return;
  }
  
  tbody.innerHTML = revs.map(r => {
    const tipo = r.tipoRevision || "Doble Ciego";
    const revisorVisual = UI_protegerIdentidad(tipo, "Autor", r.revisor, "Revisor");
    const badge = UI_BADGES[r.estado] || "bg-secondary";

    return `
      <tr>
        <td class="fw-bold align-middle">R${r.numero}</td>
        <td class="align-middle">
          <i class="bi ${(tipo.toLowerCase() === 'abierta') ? 'bi-person-check' : 'bi-eye-slash-fill text-muted'} me-1"></i>
          ${revisorVisual}
        </td>
        <td class="align-middle">
          <span class="badge ${badge} rounded-pill px-2">
            ${r.estado || 'Pendiente'}
          </span>
        </td>
        <td class="align-middle text-muted small">${r.fecha || '-'}</td>
        <td class="text-center align-middle">
          ${r.fileId ? `
            <button class="btn btn-sm btn-outline-primary shadow-sm" onclick="abrirObservacionesAutor('${r.fileId}', 'Revision R${r.numero}')">
              <i class="bi bi-eye"></i> Ver observaciones
            </button> ` : `
            <button class="btn btn-sm btn-outline-secondary border-dashed" disabled>
              <i class="bi bi-hourglass-split"></i> En espera
            </button>
          `}
        </td>
      </tr>`;
  }).join("");
}

// --- 4. ACCIONES DE USUARIO ---

function seleccionarVersion(index) {
  if (!versiones[index]) return;
  versionActual = versiones[index];
  
  UI_mostrarLoadingTabla("tablaRevisiones", 5, "Consultando dictámenes...");
  cargarPreview(versionActual.fileId);
  
  setTimeout(() => {
    renderRevisionesVersion(versionActual.revisiones);
  }, 200);

  const links = document.querySelectorAll("#tabsVersiones .nav-link");
  links.forEach((link, i) => { link.classList.toggle("active", i === index); });
}

function cargarPreview(fileId) {
  const preview = document.getElementById("previewPDF");
  if (!preview) return;
  if (!fileId) {
    preview.innerHTML = '<div class="alert alert-warning">Archivo no encontrado.</div>';
    return;
  }
  preview.innerHTML = `<div class="d-flex justify-content-center align-items-center" style="height: 200px;"><div class="spinner-border text-primary"></div></div>`;
  
  const url = 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=w1000';
  const img = new Image();
  img.onload = () => {
    preview.innerHTML = `<img src="${url}" class="img-fluid rounded shadow-sm border" style="max-height: 550px; width: 100%; object-fit: contain;">`;
  };
  img.onerror = () => {
    preview.innerHTML = `<div class="alert alert-light text-center border py-5">Previsualización no disponible. <a href="https://drive.google.com/file/d/${fileId}/view" target="_blank" class="btn btn-primary btn-sm mt-2">Abrir en Drive</a></div>`;
  };
  img.src = url;
}

function abrirVersion() {
  if (versionActual?.fileId) window.open("https://drive.google.com/file/d/" + versionActual.fileId + "/view", '_blank');
}

function eliminarVersion() {
  if (!versionActual) return;
  const modal = new bootstrap.Modal(document.getElementById('modalConfirmarEliminar'));
  modal.show();
  document.getElementById('btnConfirmarEliminarDoc').onclick = () => ejecutarEliminacionVersion(modal);
}

// --- 5. ELIMINACIÓN Y SUBIDA ---

function ejecutarEliminacionVersion(instanciaModal) {
  const btn = document.getElementById("btnConfirmarEliminarDoc");
  const status = document.getElementById("statusEliminar");
  
  btn.disabled = true;
  if (status) status.classList.remove("d-none");

  google.script.run
    .withSuccessHandler(res => {
      instanciaModal.hide();
      res.eliminadoCompleto ? cargarVista("page_documentos") : cargarDetalleDocumento();
    })
    .withFailureHandler(err => {
      btn.disabled = false;
      if (status) status.classList.add("d-none");
      alert("Error: " + err.message);
    })
    .eliminarVersionServidor(versionesFolderId, versionActual.numero);
}

async function procesarNuevaVersion() {
  const fileInput = document.getElementById('fileInputNuevaVersion');
  const btn = document.getElementById('btnConfirmarSubidaVersion');
  const status = document.getElementById('statusSubidaVersion');

  if (!fileInput.files.length) return alert("Selecciona un archivo PDF.");
  
  const file = fileInput.files[0];
  btn.disabled = true;
  if (status) status.classList.remove("d-none");

  const reader = new FileReader();
  reader.onload = function(e) {
    const base64 = e.target.result.split(",")[1];
    google.script.run
      .withSuccessHandler(() => {
        bootstrap.Modal.getInstance(document.getElementById('modalNuevaVersion')).hide();
        cargarDetalleDocumento();
      })
      .withFailureHandler(err => {
        btn.disabled = false;
        if (status) status.classList.add("d-none");
        alert(`Error: ${err.message}`);
      })
      .subirNuevaVersionServidor(versionesFolderId, base64);
  };
  reader.readAsDataURL(file);
}

function abrirObservacionesAutor(fileId, nombre) {
  if (!fileId) return alert("Archivo no disponible.");
  window.ID_REVISION_ACTUAL = fileId;
  window.NOMBRE_REVISION_ACTUAL = nombre;
  cargarVista("page_autor_visor");
}
</script>
