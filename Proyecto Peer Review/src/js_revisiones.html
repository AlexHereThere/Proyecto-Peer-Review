<script>
/**
 * js_revisiones.html - Lógica para la gestión y visualización de la lista de revisiones (Vista Revisor).
 */

// --- 1. VARIABLES GLOBALES Y CONFIGURACIÓN ---
let todasLasRevisiones = [];
let criterioRev = "Nombre";

/**
 * Inicializador de la vista de revisiones.
 */
function cargarRevisiones() {
  cargarTablaRevisiones();
}

/**
 * Realiza la llamada al servidor para obtener las revisiones asignadas al usuario actual.
 */
function cargarTablaRevisiones() {
  const tbody = document.getElementById("tablaRevisiones");
  if (!tbody) return;

  UI_mostrarLoadingTabla("tablaRevisiones", 5, "Consultando asignaciones...");
  tbody.dataset.cargando = "true";

  const timeout = setTimeout(() => {
    if (tbody.dataset.cargando === "true") {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-3"><i class="bi bi-hourglass-bottom me-1"></i> El servidor tarda demasiado.</td></tr>`;
    }
  }, 12000);

  google.script.run
    .withSuccessHandler(data => {
      tbody.dataset.cargando = "false";
      clearTimeout(timeout);
      todasLasRevisiones = data || [];
      renderTablaRevisiones(todasLasRevisiones);
    })
    .withFailureHandler(err => {
      tbody.dataset.cargando = "false";
      clearTimeout(timeout);
      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-3">Error: ${err.message}</td></tr>`;
    })
    .obtenerRevisiones_Usuario();
}

// --- 2. FILTRADO Y BÚSQUEDA ---

function setBuscarPorRev(valor) {
  criterioRev = valor;
  const el = document.getElementById("criterioActualRev");
  if (el) el.textContent = valor;
  filtrarRevisiones();
}

function filtrarRevisiones() {
  const query = document.getElementById("buscadorRev")?.value.toLowerCase() || "";
  const filtrados = todasLasRevisiones.filter(rev => {
    const nombre = (rev.nombreDoc || "").toLowerCase();
    const estado = (rev.estado || "").toLowerCase();
    const autorVisible = UI_protegerIdentidad(rev.tipoRevision, "Revisor", rev.autor, "Autor").toLowerCase();
    
    if (criterioRev === "Nombre") return nombre.includes(query);
    if (criterioRev === "Autor")  return autorVisible.includes(query);
    if (criterioRev === "Estado") return estado.includes(query);
    return true;
  });
  renderTablaRevisiones(filtrados);
}

// --- 3. RENDERIZADO DE INTERFAZ (UI) ---

function renderTablaRevisiones(revs) {
  const tbody = document.getElementById("tablaRevisiones");
  if (!tbody) return;

  if (!revs || revs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-3">No hay evaluaciones asignadas.</td></tr>`;
    return;
  }

  tbody.innerHTML = revs.map(rev => {
    const badge = UI_BADGES[rev.estado] || "bg-secondary";
    const botones = generarBotones(rev);
    const autorVisual = UI_protegerIdentidad(rev.tipoRevision, "Revisor", rev.autor, "Autor");
    
    return `
      <tr>
        <td class="align-middle fw-semibold">
          <i class="bi bi-file-earmark-pdf me-2 text-danger"></i>${rev.nombreDoc || 'Documento sin título'}
        </td>
        <td class="align-middle text-body">
          <i class="bi ${autorVisual.includes('Anónimo') ? 'bi-shield-lock-fill text-muted' : 'bi-person-circle text-primary'} me-1"></i>
          ${autorVisual}
        </td>
        <td class="align-middle text-center">
          <span class="badge ${badge} rounded-pill px-3">${rev.estado || 'Pendiente'}</span>
        </td>
        <td class="align-middle text-muted small">${rev.fecha || '-'}</td>
        <td class="align-middle text-center">${botones}</td>
      </tr>`;
  }).join("");
}

function generarBotones(rev) {
  const id = rev.idArchivoRev;
  if (!id) return `<span class="text-muted small">—</span>`;

  switch (rev.targetEstado || rev.estado) {
    case "Pendiente":
      return `
        <button class="btn btn-sm btn-success me-1 shadow-sm" onclick="cambiarEstado(this, '${id}', 'Asignado')">
          <i class="bi bi-check-lg"></i> Aceptar
        </button>
        <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="cambiarEstado(this, '${id}', 'Rechazado')">
          <i class="bi bi-x-lg"></i> Rechazar
        </button>`;

    case "Asignado":
      return `
        <button class="btn btn-sm btn-warning shadow-sm fw-medium" onclick="cambiarEstado(this, '${id}', 'En Revisión')">
          <i class="bi bi-play-fill"></i> Iniciar Revisión
        </button>`;

    case "En Revisión":
    case "En revisión":
      return `
        <button class="btn btn-sm btn-primary shadow-sm" onclick="abrirRevision('${id}')">
          <i class="bi bi-pencil-square"></i> Evaluar Documento
        </button>`;

    case "Aprobado":
    case "A Corregir":
    case "Finalizado":
      return `
        <button class="btn btn-sm btn-outline-primary shadow-sm" onclick="abrirRevision('${id}')">
          <i class="bi bi-eye"></i> Ver Evaluación
        </button>`;

    default:
      return `<span class="text-muted small">—</span>`;
  }
}

// --- 4. ACCIONES ASÍNCRONAS ---

function cambiarEstado(elementoBtn, idArchivoR, nuevoEstado) {
  if (!elementoBtn) return;
  
  elementoBtn.disabled = true;
  const contenidoOriginal = elementoBtn.innerHTML;
  elementoBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span>';

  google.script.run
    .withSuccessHandler(() => {
      cargarTablaRevisiones();
    })
    .withFailureHandler(err => {
      elementoBtn.disabled = false;
      elementoBtn.innerHTML = contenidoOriginal;
      alert("Error: " + err.message);
    })
    .cambiarEstadoRevision(idArchivoR, nuevoEstado);
}

function abrirRevision(idArchivoR) {
  if (!idArchivoR) return alert("ID no disponible.");
  window.ID_REVISION_ACTUAL = idArchivoR;
  cargarVista("page_revisor_visor");
}

// Ejecución automática al instanciar el script
cargarTablaRevisiones();
</script>
