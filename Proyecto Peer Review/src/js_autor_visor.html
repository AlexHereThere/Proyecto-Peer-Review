<script>
/**
 * @fileoverview Orquestador del visor de Adobe para la vista del Autor.
 * Configurado exclusivamente para la consulta y lectura estricta de observaciones.
 */

/**
 * Espera la carga del elemento DOM y prepara la inicialización del SDK de Adobe.
 * @async
 * @function cargarAutVisor
 */
async function cargarAutVisor() {
  try {
    await esperarElemento("adobe-dc-view-autor");
    if (window.AdobeDC) {
      iniciarFlujoAutorAdobe();
    } else {
      document.addEventListener("adobe_dc_view_sdk.ready", iniciarFlujoAutorAdobe);
    }
  } catch (e) {
    console.error("Error inicializando visor autor:", e);
  }
}

/**
 * Coordina la obtención del PDF dictaminado desde el servidor e inicia el visor.
 * @async
 * @function iniciarFlujoAutorAdobe
 */
async function iniciarFlujoAutorAdobe() {
  const idArchivo = window.ID_REVISION_ACTUAL;
  if (!idArchivo) {
    console.error("No hay ID de archivo de revisión disponible.");
    return;
  }
  try {
    //  Eliminamos Promise.all y la consulta de datos del usuario de Google.
    // Solo traemos el PDF binario correspondiente al dictamen.
    const fileObj = await runServer("getPDFData", [idArchivo]);
    
    // Forzamos el nombre de perfil "Autor" garantizando neutralidad absoluta en el visor.
    initAdobeViewerAutor(fileObj, "Autor");
  } catch (e) {
    console.error("Error cargando observaciones en el servidor:", e);
  }
}

/**
 * Configura y renderiza el visor de Adobe en modo estricto de Solo Lectura.
 * @function initAdobeViewerAutor
 * @param {Object} fileObj - Objeto con los datos del archivo (bytes, nombre, id).
 * @param {string} username - Rol del usuario para la sesión visual ("Autor").
 */
function initAdobeViewerAutor(fileObj, username) {
  const divId = "adobe-dc-view-autor";
  const container = document.getElementById(divId);
  if (!container) return;
  container.innerHTML = "";

  const adobeDCView = new AdobeDC.View({
    clientId: ADOBE_CONFIG.CLIENT_ID,
    divId: divId
  });

  const pdfBuffer = _internalBase64ToBinary(fileObj.bytes);
  const previewPromise = adobeDCView.previewFile({
    content: { promise: Promise.resolve(pdfBuffer) },
    metaData: {
      fileName: fileObj.fileName || "Dictamen_Observaciones.pdf",
      id: fileObj.fileId
    }
  }, {
    embedMode: "FULL_WINDOW",
    defaultViewMode: "FIT_PAGE",
    showAnnotationTools: true,     
    enableAnnotationAPIs: true,
    includePDFAnnotations: true      // Renderiza los comentarios que guardó el Revisor
  });

  // Aplicación inmediata del bloqueo de modificaciones
  previewPromise.then(adobeViewer => {
    adobeViewer.getAnnotationManager().then(annotManager => {
      // SOLUCIÓN: Bloqueo incondicional. El autor solo entra a leer.
      annotManager.setConfig({
        annotationPermissionsConfig: {
          profile: {
            user: {
              id: "autor_lector",
              name: username // "Autor"
            }
          },
          canAddAnnotation: false,    // Desactiva creación de notas
          canDeleteAnnotation: false, // Bloquea borrado de notas ajenas
          canUpdateAnnotation: false, // Bloquea edición de contenido
          canReplyAnnotation: false   // Desactiva respuestas en hilos
        }
      });
    });
  });
}

/**
 * Navega de regreso a la vista de detalles del documento.
 * @function volverDetalle
 */
function volverDetalle() {
  cargarVista("page_doc_detalle");
}
</script>
