<script>
/**
 * js_home.html - Lógica de Bienvenida y Sincronización Inicial
 * Gestiona el saludo personalizado y garantiza la integridad del usuario en la base de datos.
 */
function cargarHome() {
  const homeName = document.getElementById("usernameHome");

  // Obtenemos la información básica del perfil de Google
  google.script.run
    .withSuccessHandler((user) => {
      // Personalización de la interfaz (Saludo: "Hola, [Nombre]")
      if (homeName) homeName.innerText = user.name;

      // Sincronización de registro
      // Valida si el usuario ya existe en el Spreadsheet; de lo contrario, lo registra.
      sincronizarUsuario(user);
    })
    .withFailureHandler(err => console.error("Error al obtener info de Google:", err))
    .sacarGoogleInfoUsuario();
}

/**
 * Asegura que el usuario actual tenga una entrada válida en la base de datos y 
 * una estructura de carpetas en Google Drive.
 * @param {object} user - Objeto de usuario obtenido de sacarGoogleInfoUsuario.
 */
function sincronizarUsuario(user) {
  google.script.run
    .withSuccessHandler((res) => {
      // Log interno para auditoría de cliente
      console.log(res.esNuevo 
        ? `Registro inicial completado. Carpeta ID: ${res.folderId}` 
        : "Sesión de usuario verificada y activa.");
    })
    .withFailureHandler(err => console.error("Error crítico en la sincronización del usuario:", err))
    .inicializarUsuario(); 
}

/**
 * Autoejecución: Inicia la carga del componente Home.
 * Nota: En un entorno SPA, esta función es llamada por el router principal.
 */
cargarHome();
</script>
