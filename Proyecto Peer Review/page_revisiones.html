<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Revisiones Asignadas</h4>
    <button class="btn btn-sm btn-outline-secondary" onclick="cargarTablaRevisiones()">
      <i class="bi bi-arrow-clockwise"></i> Actualizar
    </button>
  </div>

  <div class="card mb-4 border-0 shadow-sm">
    <div class="card-body">
      <div class="d-flex gap-2">
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
          <input 
            type="search" 
            id="buscadorRev"
            class="form-control" 
            placeholder="Buscar por nombre o estado..." 
            oninput="filtrarRevisiones()"
          >
        </div>
        <div class="dropdown">
          <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
            Filtrar por: <span id="criterioActualRev">Nombre</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="setBuscarPorRev('Nombre')">Nombre</a></li>
            <li><a class="dropdown-item" href="#" onclick="setBuscarPorRev('Estado')">Estado</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <div class="table-responsive shadow-sm rounded">
    <table class="table table-hover table-sm table-bordered mb-0">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Estado</th>
          <th>Fecha Asignación</th>
        </tr>
      </thead>
      <tbody id="tablaRevisiones">
        </tbody>
    </table>
  </div>
</div>

</div>

<style>
  /* Mejora la experiencia visual al pasar sobre las filas */
  #tablaRevisiones tr {
    cursor: pointer;
    transition: background-color 0.2s;
  }
  #tablaRevisiones tr:hover {
    background-color: rgba(0, 123, 255, 0.05) !important;
  }
</style>
