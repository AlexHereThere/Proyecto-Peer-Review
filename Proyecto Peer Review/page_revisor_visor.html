<div class="d-flex justify-content-between align-items-center mb-2 mt-5">
    <h5 class="mb-0">Revision</h5>
    <span id="estadoBadge" class="badge bg-secondary"></span>
    <button id="btnFinalizar" class="btn btn-success btn-sm me-2" onclick="finalizarRevisionUI()">
      Finalizar revisión
    </button>

    <button class="btn btn-outline-secondary btn-sm" onclick="cargarVista('page_revisiones')">
      Volver
    </button>
</div>

<div class="container">
  <div id="adobe-dc-view-revisor"
       class="mt-3"
       style="
         height:90vh;
         width:100%;
         border:1px solid #ccc;
         background-color:#f5f5f5;
         ">
  </div>
</div>

<div class="modal fade" id="customModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Notificación</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="modalBody">
        </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="btnModalSecundario" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnModalPrincipal">Aceptar</button>
      </div>
    </div>
  </div>
</div>
