<div class="card mb-4 shadow-sm">
    <div class="card-body">
        <h4 class="card-title">Datos de Usuario</h4>
        <div class="row">
            <div class="col-md-8 border rounded p-3">
                <p><strong>Nombre:</strong> <span id="u-nombre">Cargando...</span></p>
                <p><strong>Email:</strong> <span id="u-email">Cargando...</span></p>
            </div>

            <div class="col-md-4 border rounded p-3">
             <p class="mb-2">Roles:</p>
            <div id="u-roles-container" class="d-flex flex-wrap gap-2">
            </div>
           </div>
        </div>

        <div class="row row-cols-2 row-cols-md-4 gy-4 mt-2">
            <div class="col-6 col-md-3 text-center">
                <div class="bs-icon bs-icon-xl bs-icon-circle bg-warning text-white mx-auto">
                    <svg class="bi bi-exclamation" width="2em" height="2em" fill="currentColor" viewBox="0 0 16 16"><path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0M7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.553.553 0 0 1-1.1 0z"/></svg>
                </div>
                <h2 class="fw-bold mb-0" id="stat-revisados">0</h2>
                <p class="small text-muted">Revisados</p>
            </div>

            <div class="col-6 col-md-3 text-center">
                <div class="bs-icon bs-icon-xl bs-icon-circle bg-secondary text-white mx-auto mb-2">
                    <svg class="bi bi-eyeglasses" width="2em" height="2em" fill="currentColor" viewBox="0 0 16 16"><path d="M4 6a2 2 0 1 1 0 4 2 2 0 0 1 0-4m2.625.547a3 3 0 0 0-5.584.953H.5a.5.5 0 0 0 0 1h.541A3 3 0 0 0 7 8a1 1 0 0 1 2 0 3 3 0 0 0 5.959.5h.541a.5.5 0 0 0 0-1h-.541a3 3 0 0 0-5.584-.953A2 2 0 0 0 8 6c-.532 0-1.016.208-1.375.547M14 8a2 2 0 1 1-4 0 2 2 0 0 1 4 0"></path></svg>
                </div>
                <h2 class="fw-bold mb-0" id="stat-pendientes">0</h2>
                <p class="small text-muted">Pendientes</p>
            </div>

            <div class="col-6 col-md-3 text-center">
                <div class="bs-icon bs-icon-xl bs-icon-circle bg-primary text-white mx-auto mb-2">
                    <svg class="bi bi-check" width="2em" height="2em" fill="currentColor" viewBox="0 0 16 16"><path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425z"></path></svg>
                </div>
                <h2 class="fw-bold mb-0" id="stat-terminados">0</h2>
                <p class="small text-muted">Terminados</p>
            </div>

            <div class="col-6 col-md-3 text-center">
                <div class="bs-icon bs-icon-xl bs-icon-circle bg-danger text-white mx-auto mb-2">
                    <svg class="bi bi-x" width="2em" height="2em" fill="currentColor" viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"></path></svg>
                </div>
                <h2 class="fw-bold mb-0" id="stat-corregir">0</h2>
                <p class="small text-muted">A Corregir</p>
            </div>
        </div>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <h4 class="card-title">Actividad Reciente</h4>
        <ul class="list-group list-group-flush" id="lista-actividad">
            <li class="list-group-item text-center p-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2 mb-0 text-muted">Sincronizando con el servidor...</p>
            </li>
        </ul>
    </div>
</div>
