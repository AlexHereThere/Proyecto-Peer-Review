<script src="https://documentservices.adobe.com/view-sdk/viewer.js"></script>

<script>
/**
 * js_revisor_visor.html - Lógica para el visor de anotaciones de Adobe DC.
 */

/** @constant {Object} Configuración global para el SDK de Adobe */
const ADOBE_CONFIG = {
  CLIENT_ID: "dd82eb0fb3bd4cb5ad7a75d81d99c445",
  DIV_ID: "adobe-dc-view-revisor"
};

/** @type {string|null} Estado actual de la revisión (Nuevo, En revisión, Finalizado) */
let estadoRevision = null;

/**
 * Punto de entrada principal para preparar e inicializar el visor.
 * @async
 * @function cargarRevVisor
 */
async function cargarRevVisor() {
  try {
    await esperarElemento(ADOBE_CONFIG.DIV_ID);
    if (window.AdobeDC) {
      iniciarFlujoRevisorAdobe();
    } else {
      document.addEventListener("adobe_dc_view_sdk.ready", iniciarFlujoRevisorAdobe);
    }
  } catch (error) {
    console.error("Error al inicializar contenedor de Adobe:", error);
  }
}

/**
 * Coordina la obtención de datos del servidor y la gestión de estados de la UI.
 * @async
 * @function iniciarFlujoRevisorAdobe
 */
async function iniciarFlujoRevisorAdobe() {
  const idArchivoR = window.ID_REVISION_ACTUAL;
  if (!idArchivoR) {
    console.error("No se encontró ID de revisión.");
    return;
  }
  try {
    const [user, fileObj, estado] = await Promise.all([
      runServer("sacarGoogleInfoUsuario"),
      runServer("getPDFData", [idArchivoR]),
      runServer("obtenerEstadoRevision", [idArchivoR])
    ]);
    estadoRevision = estado;
    const badge = document.getElementById("estadoBadge");
    if (badge) {
      badge.textContent = estadoRevision;
      badge.classList.remove("bg-secondary", "bg-warning", "bg-success");
      if (estadoRevision === "Nuevo") badge.classList.add("bg-secondary");
      else if (estadoRevision === "En revisión") badge.classList.add("bg-warning");
      else if (estadoRevision === "Finalizado") badge.classList.add("bg-success");
    }
    if (estadoRevision === "Finalizado") {
      const btn = document.getElementById("btnFinalizar");
      if (btn) btn.style.display = "none";
    }
    initAdobeViewer(fileObj, user.name || "Revisor");
    runServer("iniciarRevision", [idArchivoR]);
  } catch (e) {
    console.error("Error crítico en flujo de Adobe:", e);
    document.getElementById(ADOBE_CONFIG.DIV_ID).innerHTML = `
      <div class="alert alert-danger">Error al recuperar el archivo de Drive.</div>`;
  }
}

/**
 * Configura el visor, registra callbacks de perfil y guardado, y renderiza el PDF.
 * @function initAdobeViewer
 * @param {Object} fileObj - Datos del archivo (bytes, id, nombre).
 * @param {string} username - Nombre del usuario para las anotaciones.
 */
function initAdobeViewer(fileObj, username) {
  const container = document.getElementById(ADOBE_CONFIG.DIV_ID);
  if (!container) return;
  container.innerHTML = "";
  const adobeDCView = new AdobeDC.View({
    clientId: ADOBE_CONFIG.CLIENT_ID,
    divId: ADOBE_CONFIG.DIV_ID
  });
  // Registrar Perfil de Usuario
  adobeDCView.registerCallback(
    AdobeDC.View.Enum.CallbackType.GET_USER_PROFILE_API,
    () => Promise.resolve({
      code: AdobeDC.View.Enum.ApiResponseCode.SUCCESS,
      data: { userProfile: { name: username } }
    })
  );
  // Registrar Callback de Guardado
  adobeDCView.registerCallback(
    AdobeDC.View.Enum.CallbackType.SAVE_API,
    async (metaData, content) => {
      try {
        if (estadoRevision === "Finalizado") {
          return Promise.reject({ code: AdobeDC.View.Enum.ApiResponseCode.FAIL });
        }
        const base64 = await uint8ToBase64(new Uint8Array(content));
        await runServer("guardarComentarios", [base64, fileObj.fileId]);
        return Promise.resolve({
          code: AdobeDC.View.Enum.ApiResponseCode.SUCCESS,
          data: { metaData: metaData }
        });
      } catch (e) {
        console.error("Error al guardar:", e);
        return Promise.reject({ code: AdobeDC.View.Enum.ApiResponseCode.FAIL });
      }
    },
    { showSaveButton: estadoRevision !== "Finalizado" }
  );
  // Renderizar Archivo
  const pdfBuffer = _internalBase64ToBinary(fileObj.bytes);
  const previewPromise = adobeDCView.previewFile({
    content: { promise: Promise.resolve(pdfBuffer) },
    metaData: {
      fileName: fileObj.fileName || "Revision.pdf",
      id: fileObj.fileId
    }
  }, {
    embedMode: "FULL_WINDOW",
    theme: (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? "DARK_GRAY" : "LIGHT_GRAY",
    showAnnotationTools: true,
    enableAnnotationAPIs: true,
    includePDFAnnotations: true
  });

  //configurar permisos granulares
  previewPromise.then(adobeViewer => {
    adobeViewer.getAnnotationManager().then(annotManager => {
      if (estadoRevision === "Finalizado") {
        // Configuramos los permisos para bloquear la creación
        annotManager.setConfig({
          annotationPermissionsConfig: {
            canAddAnnotation: false,    // Esto quita el botón "Save" de nuevos comentarios
            canDeleteAnnotation: false, // No pueden borrar existentes
            canUpdateAnnotation: false, // No pueden editar existentes
            canReplyAnnotation: false   // No pueden responder
          }
        });
      }
    });
  });
}

/**
 * Convierte un Uint8Array a una cadena Base64 utilizando FileReader.
 * @function uint8ToBase64
 * @param {Uint8Array} uint8 - Datos binarios del PDF.
 * @returns {Promise<string>}
 */
function uint8ToBase64(uint8) {
  return new Promise((resolve) => {
    const blob = new Blob([uint8], { type: 'application/pdf' });
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });
}

/**
 * Finaliza formalmente el proceso de revisión bloqueando futuras ediciones.
 * @async
 * @function finalizarRevisionUI
 */
async function finalizarRevisionUI() {

  const confirmado = await mostrarModalFinalizar(
    "Finalizar Revisión", 
    "¿Estás seguro? Esta acción <b>bloqueará</b> futuras ediciones en este documento.", 
    true
  );

  if (!confirmado) return;

  try {
    await runServer("finalizarRevision", [window.ID_REVISION_ACTUAL]);
  
    await mostrarModalFinalizar("Éxito", "La revisión se ha guardado y finalizado correctamente.");
    
    cargarVista("page_revisiones");
  } catch (e) {
    console.error(e);
    await mostrarModalFinalizar("Error", "No pudimos finalizar la revisión. Inténtalo de nuevo.", false);
  }
}

/**
 * Muestra un modal de alerta o confirmación.
 * @param {string} titulo - Título del modal.
 * @param {string} mensaje - Cuerpo del mensaje (acepta HTML).
 * @param {boolean} esConfirmacion - Si es true, muestra botón de cancelar.
 * @returns {Promise<boolean>} - Resuelve true si el usuario acepta.
 */
function mostrarModalFinalizar(titulo, mensaje, esConfirmacion = false) {
  return new Promise((resolve) => {
    const modalEl = document.getElementById('customModal');
    const modal = new bootstrap.Modal(modalEl);
    
    // Configurar contenido
    document.getElementById('modalTitle').textContent = titulo;
    document.getElementById('modalBody').innerHTML = mensaje;
    
    const btnPrincipal = document.getElementById('btnModalPrincipal');
    const btnSecundario = document.getElementById('btnModalSecundario');
    
    // Configurar visibilidad del botón cancelar
    btnSecundario.style.display = esConfirmacion ? 'inline-block' : 'none';
    btnPrincipal.textContent = esConfirmacion ? 'Confirmar' : 'Entendido';

    // Manejadores de eventos
    const alAceptar = () => {
      modal.hide();
      resolve(true);
    };

    btnPrincipal.onclick = alAceptar;
    
    // Si se cierra sin aceptar (esc, click fuera, o cancelar)
    modalEl.addEventListener('hidden.bs.modal', () => {
      resolve(false);
    }, { once: true });

    modal.show();
  });
}
</script>
